<!DOCTYPE html>
<html>

<head>

    <title>Login</title>

    <style>

        body{
            font-family: Arial;
            background-color: #f0f2f5;
        }

        .container{
            width: 350px;
            background: white;
            padding: 30px;
            margin: 100px auto;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }

        h1{
            text-align: center;
            color: darkblue;
        }

        input{
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            margin-bottom: 15px;
        }

        button{
            width: 100%;
            padding: 10px;
            background: darkblue;
            color: white;
            border: none;
        }

    </style>

</head>

<body>

<div class="container">

    <h1>Login</h1>

    <form method="POST">

        {% csrf_token %}

        <input type="text"
               name="username"
               placeholder="Username">

        <input type="password"
               name="password"
               placeholder="Password">

        <button type="submit">Login</button>

    </form>

</div>

</body>

</html>
