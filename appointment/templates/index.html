<!DOCTYPE html>

            margin:0;

        .container{

            border-radius:5px;

        .book{

        }

        .login{
            background:darkblue;
        }

    </style>

</head>

<body>

<div class="container">

    <h1>Hospital Management System</h1>

    <a href="/book/" class="btn book">

    </a>

</div>

</body>

</html>
