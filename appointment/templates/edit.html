<!DOCTYPE html>
<html>

<head>

<title>Edit Patient</title>

<style>

body{
    font-family:Arial;
    background:#f0f2f5;
}

.container{
    width:450px;
    margin:50px auto;
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0 0 10px gray;
}

h1{
    text-align:center;
    color:darkblue;
}

input,
select{
    width:100%;
    padding:12px;
    margin-top:10px;
    margin-bottom:20px;
    border:1px solid gray;
    border-radius:5px;
}

button{
    width:100%;
    padding:12px;
    background:darkblue;
    color:white;
    border:none;
    border-radius:5px;
    font-size:18px;
}

button:hover{
    background:blue;
}

</style>

</head>

<body>

<div class="container">

<h1>Edit Patient</h1>

<form method="POST" action="/edit/{{ patient.id }}/?page={{ page }}">
    {% csrf_token %}


<label>Name</label>

<input type="text"
       name="name"
       value="{{ patient.name }}"
       required>

<label>Age</label>

<input type="number"
       name="age"
       value="{{ patient.age }}"
       required>

<label>Gender</label>

<select name="gender">

<option value="Male"
{% if patient.gender == 'Male' %}
selected
{% endif %}>
Male
</option>

<option value="Female"
{% if patient.gender == 'Female' %}
selected
{% endif %}>
Female
</option>

</select>

<label>Phone</label>

<input type="text"
       name="phone"
       value="{{ patient.phone }}"
       required>

<label>Date</label>

<input type="date"
       name="date"
       value="{{ patient.date|date:'Y-m-d' }}"
       required>

<label>Time</label>

<input type="time"
       name="time"
       value="{{ patient.time|time:'H:i' }}"
       required>

<label>Doctor</label>

<select name="doctor">

{% for doctor in doctors %}

<option value="{{ doctor.id }}"
{% if patient.doctor.id == doctor.id %}
selected
{% endif %}>

{{ doctor.name }} -
{{ doctor.specialization }}

</option>

{% endfor %}

</select>

<label>Status</label>

<select name="status">

<option value="Pending"
{% if patient.status == 'Pending' %}
selected
{% endif %}>
Pending
</option>

<option value="Completed"
{% if patient.status == 'Completed' %}
selected
{% endif %}>
Completed
</option>

<option value="Cancelled"
{% if patient.status == 'Cancelled' %}
selected
{% endif %}>
Cancelled
</option>

</select>

<button type="submit">

Update Patient

</button>

</form>

</div>

</body>

</html>
